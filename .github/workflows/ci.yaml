name: ci
on:
  pull_request:
    branches:
      - main
jobs:
  check:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fami-2026/vge.dev:latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: task client:ci

      - name: Lint
        run: task client:ci:lint

      - name: Format
        run: |
          task server:ci:format
          task client:ci:format

      - name: Commit
        uses: EndBug/add-and-commit@v9
        with:
          message: 'ops/bot: #25: format and lint'
