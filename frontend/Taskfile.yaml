version: "3"

tasks:
  image:
    cmds:
      - docker build -t {{.REGISTRY}}/vge.client:latest .
  publish:
    cmds:
      - docker push {{.REGISTRY}}/vge.client:latest
  deploy:
    cmds:
      - docker network create vge || true
      - docker compose up -d
  ci:
    cmds:
      - npm ci
  build:
    env:
      BASE: '{{.BASE | default "/"}}'
    cmds:
      - npm run build-ci
  format:
    cmds:
      - npm run format
  lint:
    cmds:
      - npm run lint
